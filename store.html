<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Store | 27668grafix - Premium Branding</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { "primary": "#D4AF37", "dark": "#000000" } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000000; }
        .hamburger-line { display: block; width: 24px; height: 2px; background-color: #000; margin: 5px auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .cart-badge { position: absolute; top: -2px; right: -2px; background: #D4AF37; color: black; font-size: 9px; font-weight: 900; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid white; }
        input, textarea, select { font-size: 16px !important; border: 1px solid #e2e8f0 !important; border-radius: 12px !important; }
        .modal-scroll::-webkit-scrollbar { width: 4px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        
        /* Loading Animation */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #D4AF37; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased overflow-x-hidden bg-white">

<!-- NAVIGATION -->
<header class="fixed top-0 z-[100] w-full bg-white/95 backdrop-blur-md border-b border-slate-100 px-4 sm:px-8">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-16 md:h-20">
        <h2 class="text-dark text-xl md:text-2xl font-black tracking-tighter uppercase italic cursor-pointer" onclick="window.location.href='index.html'">27668<span class="text-primary">grafix</span></h2>
        <div class="flex items-center gap-4">
            <button onclick="toggleCart()" class="relative p-2"><svg class="w-6 h-6 text-dark" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg><div id="cartCount" class="cart-badge">0</div></button>
            <button onclick="toggleMobileMenu()" class="lg:hidden flex flex-col gap-1.5"><span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span></button>
        </div>
    </div>
</header>

<main class="pt-24 pb-20 px-4 md:px-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl md:text-6xl font-black italic uppercase tracking-tighter mb-12">The <span class="text-primary">Catalog.</span></h1>
        <div id="productGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 md:gap-8"></div>
    </div>
</main>

<!-- CART SIDEBAR -->
<div id="cartSidebar" class="fixed inset-0 z-[200] hidden">
    <div class="absolute inset-0 bg-black/40" onclick="toggleCart()"></div>
    <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8 border-b pb-4"><h3 class="text-xl font-black uppercase">Your Cart</h3><button onclick="toggleCart()" class="text-3xl">&times;</button></div>
        <div id="cartItemsList" class="flex-1 overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="border-t pt-6 mt-6 space-y-4">
            <div class="flex justify-between font-black text-xl italic uppercase"><span>Total:</span><span id="cartTotalText">₦0.00</span></div>
            <button onclick="openCheckout()" class="w-full bg-primary text-black py-4 rounded-xl font-black uppercase text-xs tracking-widest">Checkout via Transfer</button>
        </div>
    </div>
</div>

<!-- TWO-STEP CHECKOUT MODAL -->
<div id="checkoutModal" class="fixed inset-0 z-[250] bg-black/95 backdrop-blur-md hidden flex items-center justify-center p-2">
    <div class="bg-white rounded-[2rem] max-w-xl w-full flex flex-col max-h-[90vh] shadow-2xl overflow-hidden border border-primary/20">
        
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
            <h3 class="text-xl font-black uppercase italic tracking-tighter">Order Processing</h3>
            <button onclick="location.reload()" class="text-slate-400 text-2xl">&times;</button>
        </div>

        <div class="overflow-y-auto p-6 space-y-6 modal-scroll" id="checkoutContainer">
            <!-- STEP 1: FORM -->
            <form id="checkoutForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="custName" placeholder="Full Name" required class="w-full p-4 font-bold text-sm outline-none">
                    <input type="tel" id="custPhone" placeholder="Phone Number" required class="w-full p-4 font-bold text-sm outline-none">
                </div>
                <input type="email" id="custEmail" placeholder="Email Address" required class="w-full p-4 font-bold text-sm outline-none">
                <textarea id="custAddress" placeholder="Full Shipping Address" required class="w-full p-4 font-bold text-sm h-20 outline-none"></textarea>
                <textarea id="projDesc" placeholder="Project Description & Customization Notes" required class="w-full p-4 font-bold text-sm h-24 outline-none"></textarea>
                
                <div class="flex justify-between items-center border-t pt-4">
                    <span class="font-black text-primary text-xl" id="checkoutAmount">₦0.00</span>
                    <button type="submit" id="proceedBtn" class="bg-dark text-primary px-8 py-4 rounded-xl font-black uppercase text-xs tracking-widest transition-all">Proceed to Payment</button>
                </div>
            </form>

            <!-- STEP 2: BANK DETAILS & LOADER (Hidden initially) -->
            <div id="paymentStep" class="hidden space-y-6 animate-pulse">
                <div class="text-center py-4">
                    <div class="loader mb-2"></div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-primary">Generating Track ID...</p>
                </div>

                <div class="bg-dark text-white p-6 rounded-3xl border border-primary/40 text-center">
                    <h4 class="text-primary text-[10px] font-black uppercase mb-4 tracking-[0.3em]">Official Company Account</h4>
                    <p class="text-xs opacity-60 uppercase mb-1">GTBANK</p>
                    <p class="text-2xl font-black tracking-widest text-white italic mb-4">0030791230</p>
                    <p class="text-[10px] font-bold uppercase text-white/70 tracking-widest">27.668grafix company</p>
                </div>

                <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200">
                    <p class="text-xs font-bold text-slate-500 mb-1 uppercase">Your Track ID:</p>
                    <p id="generatedTrackID" class="text-xl font-black text-dark tracking-tighter">#----</p>
                </div>

                <button onclick="confirmTransaction()" class="w-full bg-primary text-black py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-primary/20">
                    I Have Made the Transaction
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bmyimmssovqcznwixceu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJteWltbXNzb3ZxY3pud2l4Y2V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MDY4MjcsImV4cCI6MjA4NzQ4MjgyN30.e5ywzLSv5v4TzeHrOZrc3uFe4UDV-l845RAMUS3PEe4';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let products = [], cart = [], currentTrackID = "";

    async function initStore() {
        const { data } = await sb.from('products').select('*').order('created_at', { ascending: false });
        if(data) { products = data; renderProducts(data); }
    }

    function renderProducts(list) {
        document.getElementById('productGrid').innerHTML = list.map(p => `
            <div onclick="openProduct('${p.id}')" class="cursor-pointer group">
                <div class="aspect-square rounded-2xl overflow-hidden mb-3 border border-slate-100 shadow-sm group-hover:shadow-md transition-all">
                    <img src="${p.images[0]}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                </div>
                <h3 class="text-[10px] font-black uppercase italic truncate">${p.name}</h3>
                <p class="text-primary font-black text-xs">₦${parseFloat(p.price).toLocaleString()}</p>
            </div>
        `).join('');
    }

    // Logic to switch between Form and Bank Details
    document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('proceedBtn');
        btn.innerText = "Loading..."; btn.disabled = true;

        const phone = document.getElementById('custPhone').value;
        const phoneSuffix = phone.slice(-4);
        currentTrackID = `GRAF-${phoneSuffix}-${Math.floor(1000 + Math.random() * 9000)}`;
        
        // Save to Supabase for tracking
        const { error } = await sb.from('orders').insert([{
            track_id: currentTrackID,
            customer_name: document.getElementById('custName').value,
            phone: phone,
            items: cart.map(i => `${i.name} (x${i.qty})`).join(', '),
            total_price: cart.reduce((acc, i) => acc + (i.price * i.qty), 0),
            description: document.getElementById('projDesc').value
        }]);

        if(error) return alert("System busy, please try again.");

        // Show Payment Step
        document.getElementById('checkoutForm').classList.add('hidden');
        document.getElementById('paymentStep').classList.remove('hidden');
        document.getElementById('generatedTrackID').innerText = currentTrackID;
    });

    function confirmTransaction() {
        const total = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
        const name = document.getElementById('custName').value;
        const desc = document.getElementById('projDesc').value;
        const summary = cart.map(i => `${i.name} (x${i.qty})`).join(', ');

        const msg = `Hello 27668grafix! 🔥%0A%0A*I HAVE MADE PAYMENT*%0A%0A*Track ID:* ${currentTrackID}%0A*Name:* ${name}%0A*Items:* ${summary}%0A*Total Paid:* ₦${total.toLocaleString()}%0A%0A*Project Description:*%0A${desc}%0A%0A_Please confirm my transaction._`;
        
        window.open(`https://wa.me/2348033491036?text=${msg}`, '_blank');
        location.reload();
    }

    // Helper functions
    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('hidden'); }
    function openCheckout() { if(cart.length === 0) return alert("Cart empty!"); document.getElementById('checkoutModal').classList.remove('hidden'); }
    function openProduct(id) { 
        const p = products.find(x => x.id === id); 
        const q = prompt(`How many ${p.name} do you want?`, "1");
        if(q && !isNaN(q)) {
            const ex = cart.find(i => i.id === p.id);
            if(ex) ex.qty += parseInt(q); else cart.push({...p, qty: parseInt(q)});
            updateCartUI();
        }
    }
    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.reduce((acc, i) => acc + i.qty, 0);
        let total = 0;
        document.getElementById('cartItemsList').innerHTML = cart.map(i => {
            total += i.price * i.qty;
            return `<div class='flex gap-3 items-center border-b pb-2'><img src='${i.images[0]}' class='w-10 h-10 rounded object-cover'><div class='flex-1'><p class='text-[10px] font-black uppercase'>${i.name}</p><p class='text-[10px]'>Qty: ${i.qty}</p></div></div>`;
        }).join('');
        document.getElementById('cartTotalText').innerText = `₦${total.toLocaleString()}`;
        document.getElementById('checkoutAmount').innerText = `₦${total.toLocaleString()}`;
    }
    function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }
    window.onload = initStore;
</script>

</body>
</html>
