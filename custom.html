<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard | 27668grafix Elite Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#ff6a00", "background-dark": "#0f0f0f", "card-dark": "#161616" } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Sidebar Link Styling */
        .sidebar-link { color: #94a3b8; transition: all 0.3s ease; }
        .sidebar-link.active { background: #ff6a00 !important; color: white !important; box-shadow: 0 4px 15px rgba(255, 106, 0, 0.3); }
        .sidebar-link:hover:not(.active) { background: rgba(255, 255, 255, 0.05); color: white; }

        /* Prevent Icons from showing as text words */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-[100] w-64 bg-card-dark border-r border-white/5 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="flex flex-col h-full p-4">
                <!-- Brand -->
                <div class="p-4 mb-6">
                    <h2 class="text-xl font-black italic uppercase tracking-tighter">27668<span class="text-primary">grafix</span></h2>
                </div>
                
                <!-- Navigation -->
                <nav class="flex-1 space-y-1 overflow-y-auto no-scrollbar px-2">
                    <p class="px-4 text-[10px] font-black uppercase tracking-[0.2em] text-slate-600 mb-2">Main Portal</p>
                    
                    <button onclick="showSection('overview', this)" class="sidebar-link active w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-widest">
                        <span class="material-symbols-outlined">dashboard</span> 
                        <span class="truncate">Overview</span>
                    </button>
                    
                    <button onclick="showSection('orders', this)" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-widest">
                        <span class="material-symbols-outlined">shopping_bag</span> 
                        <span class="truncate">Orders</span>
                    </button>
                    
                    <button onclick="showSection('wallet', this)" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-widest">
                        <span class="material-symbols-outlined">account_balance_wallet</span> 
                        <span class="truncate">Wallet</span>
                    </button>
                    
                    <button onclick="showSection('settings', this)" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-widest">
                        <span class="material-symbols-outlined">settings</span> 
                        <span class="truncate">Settings</span>
                    </button>

                    <!-- Links -->
                    <div class="pt-6 border-t border-white/5 mt-6 space-y-1">
                        <p class="px-4 text-[10px] font-black uppercase tracking-[0.2em] text-slate-600 mb-2">Quick Access</p>
                        <a href="index.html" class="flex items-center gap-3 px-4 py-2 text-[10px] text-slate-500 hover:text-white uppercase font-bold transition-colors">
                            <span class="material-symbols-outlined text-sm">home</span> Home
                        </a>
                        <a href="store.html" class="flex items-center gap-3 px-4 py-2 text-[10px] text-slate-500 hover:text-white uppercase font-bold transition-colors">
                            <span class="material-symbols-outlined text-sm">store</span> Store
                        </a>
                    </div>
                </nav>

                <!-- Logout (Only One Button) -->
                <div class="p-2 border-t border-white/5">
                    <button onclick="handleLogout()" class="w-full flex items-center gap-3 px-4 py-4 text-red-500 font-black uppercase text-[11px] tracking-widest hover:bg-red-500/10 rounded-xl transition-all">
                        <span class="material-symbols-outlined">logout</span> 
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col min-w-0 lg:ml-64 bg-background-dark">
            <!-- Header -->
            <header class="h-16 md:h-20 flex items-center justify-between px-6 border-b border-white/5 bg-background-dark/50 backdrop-blur-md sticky top-0 z-40">
                <button onclick="toggleSidebar()" class="lg:hidden text-white"><span class="material-symbols-outlined">menu</span></button>
                
                <div class="hidden md:block">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Secure Elite Portal</h3>
                </div>

                <div class="flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <p id="userNameDisplay" class="text-xs font-black uppercase italic truncate max-w-[150px]">User Name</p>
                        <p id="userBalanceDisplay" class="text-[10px] text-primary font-bold">₦0.00</p>
                    </div>
                    <img id="userAvatarDisplay" src="https://ui-avatars.com/api/?name=User&background=ff6a00&color=fff" class="w-10 h-10 rounded-full border border-primary/20 object-cover" alt="Profile">
                </div>
            </header>

            <!-- Sections Container -->
            <div class="flex-1 overflow-y-auto p-4 md:p-8 no-scrollbar">
                
                <!-- Overview -->
                <section id="overviewSection" class="dashboard-section space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="glass p-6 rounded-2xl">
                            <p class="text-slate-500 text-[9px] font-black uppercase tracking-widest mb-1">Orders</p>
                            <h4 class="text-2xl font-black italic">0</h4>
                        </div>
                        <div class="glass p-6 rounded-2xl border-l-2 border-primary">
                            <p class="text-slate-500 text-[9px] font-black uppercase tracking-widest mb-1">Balance</p>
                            <h4 id="overviewBalance" class="text-2xl font-black italic text-primary">₦0.00</h4>
                        </div>
                        <div class="glass p-6 rounded-2xl">
                            <p class="text-slate-500 text-[9px] font-black uppercase tracking-widest mb-1">Spent</p>
                            <h4 class="text-2xl font-black italic">₦0.00</h4>
                        </div>
                    </div>
                    <div class="glass rounded-2xl p-12 text-center text-slate-600">
                        <span class="material-symbols-outlined text-4xl mb-2 opacity-20">history</span>
                        <p class="text-xs font-bold uppercase tracking-widest">No recent activity</p>
                    </div>
                </section>

                <!-- Orders -->
                <section id="ordersSection" class="dashboard-section hidden">
                    <h2 class="text-xl font-black uppercase italic mb-6">Track Orders</h2>
                    <div class="glass rounded-2xl p-10 text-center text-slate-500">
                        <p>No orders found in your history.</p>
                    </div>
                </section>

                <!-- Wallet -->
                <section id="walletSection" class="dashboard-section hidden">
                    <div class="max-w-md mx-auto bg-gradient-to-br from-primary to-orange-800 p-8 rounded-3xl text-center shadow-2xl">
                        <p class="text-white/70 text-[10px] font-black uppercase mb-2">Available Wallet Balance</p>
                        <h4 id="walletBalanceBig" class="text-4xl font-black italic mb-6">₦0.00</h4>
                        <button onclick="toggleFundInput()" class="bg-white text-primary px-8 py-3 rounded-xl font-black uppercase text-[10px]">Add Funds</button>
                    </div>
                    <div id="fundInputArea" class="hidden max-w-md mx-auto mt-6 glass p-6 rounded-2xl space-y-4">
                        <input type="number" id="fundAmount" placeholder="Amount (₦)" class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-6 text-xl font-bold outline-none">
                        <button onclick="payWithPaystack()" class="w-full bg-primary py-4 rounded-xl font-black uppercase text-xs">Pay Securely</button>
                    </div>
                </section>

                <!-- Settings -->
                <section id="settingsSection" class="dashboard-section hidden">
                    <h2 class="text-xl font-black uppercase italic mb-8">Settings</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="glass p-8 rounded-2xl text-center flex flex-col items-center h-fit">
                            <div class="relative group">
                                <img id="settingsAvatarPreview" src="https://ui-avatars.com/api/?name=User" class="w-24 h-24 rounded-full border-4 border-primary/20 object-cover">
                                <label class="absolute inset-0 flex items-center justify-center bg-black/60 rounded-full opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity">
                                    <span class="material-symbols-outlined text-white">photo_camera</span>
                                    <input type="file" id="avatarUpload" class="hidden" accept="image/*" onchange="previewAndUploadAvatar()">
                                </label>
                            </div>
                            <p class="mt-4 text-[9px] text-slate-500 font-bold uppercase tracking-widest">Update Photo</p>
                        </div>
                        <div class="lg:col-span-2 glass p-6 rounded-2xl space-y-4">
                            <input type="text" id="setFullName" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-primary">
                            <input type="tel" id="setPhone" placeholder="Phone Number" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-primary">
                            <textarea id="setAddress" placeholder="Delivery Address" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 h-24 outline-none focus:border-primary"></textarea>
                            <button onclick="updateProfile()" id="saveProfileBtn" class="bg-primary px-8 py-3 rounded-xl font-black uppercase text-[10px]">Save Changes</button>
                        </div>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script>
        const SUPABASE_URL = 'https://bmyimmssovqcznwixceu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJteWltbXNzb3ZxY3pud2l4Y2V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MDY4MjcsImV4cCI6MjA4NzQ4MjgyN30.e5ywzLSv5v4TzeHrOZrc3uFe4UDV-l845RAMUS3PEe4';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) window.location.href = 'login.html';
            else { currentUser = user; loadUserData(); }
        }

        function loadUserData() {
            const meta = currentUser.user_metadata;
            const fullName = meta.full_name || "Elite User";
            const avatar = meta.avatar_url || `https://ui-avatars.com/api/?name=${fullName}&background=ff6a00&color=fff`;
            const balance = meta.balance || 0;

            document.getElementById('userNameDisplay').innerText = fullName;
            document.getElementById('setFullName').value = fullName;
            document.getElementById('setPhone').value = meta.phone || "";
            document.getElementById('setAddress').value = meta.address || "";
            document.getElementById('userAvatarDisplay').src = avatar;
            document.getElementById('settingsAvatarPreview').src = avatar;

            const fmt = new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN' }).format(balance);
            document.getElementById('userBalanceDisplay').innerText = fmt;
            document.getElementById('overviewBalance').innerText = fmt;
            document.getElementById('walletBalanceBig').innerText = fmt;
        }

        function showSection(id, btn) {
            document.querySelectorAll('.dashboard-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + 'Section').classList.remove('hidden');
            
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
            
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function toggleFundInput() { document.getElementById('fundInputArea').classList.toggle('hidden'); }

        async function updateProfile() {
            const btn = document.getElementById('saveProfileBtn');
            btn.innerText = "Saving...";
            const { error } = await supabaseClient.auth.updateUser({
                data: { 
                    full_name: document.getElementById('setFullName').value,
                    phone: document.getElementById('setPhone').value,
                    address: document.getElementById('setAddress').value
                }
            });
            if (error) alert(error.message); else { alert("Profile Updated!"); loadUserData(); }
            btn.innerText = "Save Changes";
        }

        async function previewAndUploadAvatar() {
            const file = document.getElementById('avatarUpload').files[0];
            if (!file) return;
            const fileExt = file.name.split('.').pop();
            const filePath = `${currentUser.id}/profile.${fileExt}`;
            const { error: uploadError } = await supabaseClient.storage.from('avatars').upload(filePath, file, { upsert: true });
            if (uploadError) return alert(uploadError.message);
            const { data } = supabaseClient.storage.from('avatars').getPublicUrl(filePath);
            await supabaseClient.auth.updateUser({ data: { avatar_url: data.publicUrl } });
            location.reload();
        }

        function payWithPaystack() {
            const amount = document.getElementById('fundAmount').value;
            if (amount < 500) return alert("Min deposit ₦500");
            let handler = PaystackPop.setup({
                key: 'YOUR_PAYSTACK_PUBLIC_KEY',
                email: currentUser.email,
                amount: amount * 100,
                callback: async function() {
                    const bal = parseFloat(currentUser.user_metadata.balance || 0) + parseFloat(amount);
                    await supabaseClient.auth.updateUser({ data: { balance: bal } });
                    location.reload();
                }
            });
            handler.openIframe();
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        checkUser();
    </script>
</body>
</html>
