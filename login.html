<!DOCTYPE html>

<html class="dark" lang="en"><head>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff6a00",

<style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bg-mesh {
            background-color: #121212;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 106, 0, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 106, 0, 0.1) 0px, transparent 50%);
        }

        <script>
    const infoContent = {
        privacy: {
            title: "Privacy Policy 🛡️",
            body: "At 27668grafix, we value your privacy. Your design files and personal data are strictly used for order fulfillment and never shared with third parties. We ensure all client information is stored securely on our encrypted servers."
        },
        terms: {
            title: "Terms & Conditions 📜",
            body: "Production begins only after design approval and payment confirmation. 27668grafix is not liable for errors (spelling or layout) once a client has signed off on the final proof. Standard production time is 3-5 working days."
        },
        support: {
            title: "Support 📞",
            body: `
                <p><strong>Office Address:</strong> 18, George Street, Igbobi, Lagos.</p>
                <p><strong>WhatsApp:</strong> +234 803 3491 036</p>
                <p><strong>Email:</strong> 27.668grafix@gmail.com</p>
                <p class="pt-4 text-primary font-bold">Our team is available 24/7 for design & logistics support.</p>
            `
        }
    };

    function openInfoModal(type) {
        const overlay = document.getElementById('infoModalOverlay');
        const box = document.getElementById('infoModalBox');
        const title = document.getElementById('infoTitle');
        const body = document.getElementById('infoBody');

        title.innerText = infoContent[type].title;
        body.innerHTML = infoContent[type].body;

        overlay.classList.remove('hidden');
        setTimeout(() => {
            box.classList.remove('scale-95', 'opacity-0');
            box.classList.add('scale-100', 'opacity-100');
        }, 10);
    }

    function closeInfoModal() {
        const overlay = document.getElementById('infoModalOverlay');
        const box = document.getElementById('infoModalBox');

        box.classList.remove('scale-100', 'opacity-100');
        box.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
            overlay.classList.add('hidden');
        }, 300);
    }

    // Close when clicking outside the box
    window.addEventListener('click', (e) => {
        const overlay = document.getElementById('infoModalOverlay');
        if (e.target === overlay) {
            closeInfoModal();
        }
    });
</script>
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">

<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-6 mt-12">
<div class="w-full max-w-[480px] space-y-8">
<!-- Glassmorphism Card -->

<!-- Role Switcher -->
<div class="flex p-1 mb-8 bg-black/20 rounded-lg">

<input checked="" class="peer hidden" name="role" type="radio" value="customer"/>
<div class="py-2.5 text-center text-sm font-semibold rounded-md transition-all peer-checked:bg-primary peer-checked:text-white text-slate-400">

</label>

<input class="peer hidden" name="role" type="radio" value="corporate"/>

                                Corporate Partner

</label>
</div>
<!-- Login Form -->
<form action="#" class="space-y-5">
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500" for="email">Email Address</label>
<div class="relative group">

<input class="w-full bg-white/5 border border-white/10 rounded-lg py-3.5 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-white placeholder:text-slate-600" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">

<label class="text-xs font-semibold uppercase tracking-wider text-slate-500" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-3.5 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-white placeholder:text-slate-600" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-orange-600 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all transform hover:-translate-y-0.5 active:translate-y-0" type="submit">
                            Sign In
                        </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-background-dark/50 px-2 text-slate-500 backdrop-blur-sm">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border border-white/10 bg-white/5 hover:bg-white/10 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12.48 10.92v3.28h7.84c-.24 1.84-.908 3.152-1.928 4.176-1.02 1.024-2.612 2.128-5.912 2.128-5.368 0-9.712-4.344-9.712-9.712s4.344-9.712 9.712-9.712c2.892 0 5.152 1.136 6.708 2.612l2.308-2.308C19.1 1.072 16.148 0 12.48 0 5.58 0 0 5.58 0 12.48s5.58 12.48 12.48 12.48c3.708 0 6.504-1.22 8.708-3.512 2.272-2.272 2.984-5.468 2.984-8.032 0-.768-.064-1.488-.184-2.128H12.48z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border border-white/10 bg-white/5 hover:bg-white/10 transition-colors">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.12 1.72-3.41 1.72-1.24 0-1.74-.77-3.23-.77-1.49 0-2.07.75-3.21.75-1.28 0-2.52-.84-3.56-1.89-2.1-2.13-2.6-6.13-.56-8.23 1.01-1.04 2.18-1.58 3.23-1.58.98 0 1.76.62 2.51.62.72 0 1.29-.62 2.47-.62 1.05 0 2.1.5 3.03 1.34-2.11 1.25-1.77 4.1.33 5.37-.58 1.15-1.34 2.22-2.3 3.21zM12.03 6.25c-.21-2.05 1.4-3.85 3.25-4.25.26 2.25-1.92 4.18-3.25 4.25z"></path>
</svg>

</button>
</div>
<div class="mt-8 text-center">

                            Don't have an account?

</div>
</div>
<!-- Branding Footer -->
<div class="flex flex-col md:flex-row items-center justify-between gap-4 px-2 text-[10px] uppercase tracking-[0.2em] text-slate-600 font-bold">
<p>© 2024 27668grafix Nigeria</p>
<div class="flex gap-6">
    <a class="hover:text-primary transition-colors cursor-pointer" onclick="openInfoModal('privacy')">Privacy</a>
    <a class="hover:text-primary transition-colors cursor-pointer" onclick="openInfoModal('terms')">Terms</a>
    <a class="hover:text-primary transition-colors cursor-pointer" onclick="openInfoModal('support')">Support</a>
</div>
</div>
</div>
</main>
<!-- Decorative elements -->
<div class="fixed bottom-0 right-0 p-10 pointer-events-none opacity-20">
<span class="material-symbols-outlined text-[120px] text-primary rotate-12">print</span>
</div>
<div class="fixed top-1/4 -left-20 p-10 pointer-events-none opacity-10">
<span class="material-symbols-outlined text-[200px] text-primary -rotate-12">auto_awesome</span>
</div>
</div>

        <!-- Info Modal Overlay -->
<div id="infoModalOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
    <div id="infoModalBox" class="glass-effect p-8 rounded-2xl max-w-lg w-full transform transition-all scale-95 opacity-0 duration-300 relative">
        <!-- Close Button -->
        <button onclick="closeInfoModal()" class="absolute top-4 right-4 text-slate-400 hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-2xl">close</span>
        </button>

        <div class="text-left">
            <h3 id="infoTitle" class="text-2xl font-bold text-white mb-4 uppercase tracking-tighter italic"></h3>
            <div id="infoBody" class="text-slate-400 text-sm leading-relaxed space-y-4">

            </div>

        <button onclick="closeInfoModal()" class="mt-8 w-full bg-primary/20 border border-primary/50 text-primary font-bold py-3 rounded-lg hover:bg-primary hover:text-white transition-all">

</div>
