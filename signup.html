<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Join the Elite | 27668grafix</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#ff6a00", "background-dark": "#121212" }, fontFamily: { "display": ["Inter", "sans-serif"] } } }
        }
    </script>
    <style>
        .glass-effect { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bg-mesh { background-color: #121212; background-image: radial-gradient(at 0% 0%, rgba(255, 106, 0, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(255, 106, 0, 0.1) 0px, transparent 50%); }
    </style>
</head>
<body class="font-display bg-background-dark text-slate-100 antialiased overflow-x-hidden bg-mesh">
    <header class="w-full flex items-center justify-between px-6 lg:px-20 py-6 absolute top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white"><span class="material-symbols-outlined">grid_view</span></div>
            <h1 class="text-xl font-bold tracking-tight uppercase">27668grafix</h1>
        </div>
    </header>

    <main class="min-h-screen flex items-center justify-center p-6 pt-24">
        <div class="w-full max-w-[500px] space-y-8">
            <div class="glass-effect p-8 md:p-10 rounded-xl shadow-2xl">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold mb-2 tracking-tight italic">Join the Elite</h2>
                    <p class="text-slate-400 text-sm">Create an account to start your branding journey.</p>
                </div>

                <!-- Role Switcher -->
                <div class="flex p-1 mb-8 bg-black/20 rounded-lg">
                    <label class="flex-1 cursor-pointer">
                        <input checked class="peer hidden" name="role" type="radio" value="customer" onchange="toggleCorporateField()"/>
                        <div class="py-2 text-center text-sm font-semibold rounded-md transition-all peer-checked:bg-primary peer-checked:text-white text-slate-400">Customer</div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input class="peer hidden" name="role" type="radio" value="corporate" onchange="toggleCorporateField()"/>
                        <div class="py-2 text-center text-sm font-semibold rounded-md transition-all peer-checked:bg-primary peer-checked:text-white text-slate-400">Corporate Partner</div>
                    </label>
                </div>

                <form id="signupForm" class="space-y-4">
                    <input type="text" id="fullname" placeholder="Full Name" required class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary outline-none">
                    
                    <!-- Special Corporate Field (Hidden by default) -->
                    <div id="corporateGroup" class="hidden animate-pulse">
                        <input type="text" id="companyName" placeholder="Company Name" class="w-full bg-white/5 border border-primary/30 rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary outline-none">
                    </div>

                    <input type="email" id="email" placeholder="Email Address" required class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary outline-none">
                    <input type="tel" id="phone" placeholder="Phone Number" required class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary outline-none">
                    <input type="password" id="password" placeholder="Password" required class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary outline-none">
                    
                    <button type="submit" id="submitBtn" class="w-full bg-primary hover:bg-orange-600 text-white font-bold py-4 rounded-lg transition-all">Create Account</button>
                </form>

                <p class="mt-6 text-center text-slate-500 text-sm">Already a member? <a href="login.html" class="text-primary font-bold">Sign In</a></p>
            </div>
            
            <!-- Footer Links -->
            <div class="flex justify-between text-[10px] uppercase font-bold text-slate-600">
                <p>© 2024 27668grafix</p>
                <div class="flex gap-4">
                    <span class="cursor-pointer hover:text-primary" onclick="openInfoModal('privacy')">Privacy</span>
                    <span class="cursor-pointer hover:text-primary" onclick="openInfoModal('terms')">Terms</span>
                </div>
            </div>
        </div>
    </main>

    <!-- SUCCESS OVERLAY -->
    <div id="successOverlay" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] hidden flex items-center justify-center p-6 text-center">
        <div>
            <span class="material-symbols-outlined text-primary text-7xl mb-4">check_circle</span>
            <h2 class="text-3xl font-black uppercase italic text-white">Successful!</h2>
            <p class="text-slate-400">Redirecting you to the login page...</p>
        </div>
    </div>

    <!-- MODAL -->
    <div id="infoModalOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div id="infoModalBox" class="glass-effect p-8 rounded-2xl max-w-lg w-full relative">
            <h3 id="infoTitle" class="text-xl font-bold text-white mb-4 italic"></h3>
            <div id="infoBody" class="text-slate-400 text-sm leading-relaxed"></div>
            <button onclick="closeInfoModal()" class="mt-6 w-full py-2 bg-primary/20 text-primary rounded">Close</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bmyimmssovqcznwixceu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJteWltbXNzb3ZxY3pud2l4Y2V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MDY4MjcsImV4cCI6MjA4NzQ4MjgyN30.e5ywzLSv5v4TzeHrOZrc3uFe4UDV-l845RAMUS3PEe4';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleCorporateField() {
            const role = document.querySelector('input[name="role"]:checked').value;
            document.getElementById('corporateGroup').style.display = (role === 'corporate') ? 'block' : 'none';
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing...";
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;

            const { data, error } = await supabaseClient.auth.signUp({
                email: email, password: password,
                options: { data: { 
                    full_name: document.getElementById('fullname').value, 
                    phone: document.getElementById('phone').value,
                    user_role: role,
                    company: document.getElementById('companyName').value || "None"
                } }
            });

            if (error) { alert(error.message); btn.innerText = "Create Account"; }
            else { 
                document.getElementById('successOverlay').classList.remove('hidden');
                setTimeout(() => window.location.href = 'login.html', 3000);
            }
        });

        const infoContent = {
            privacy: { title: "Privacy Policy 🛡️", body: "We protect your design files and personal data strictly for order fulfillment." },
            terms: { title: "Terms & Conditions 📜", body: "Production begins after design sign-off. We are not liable for spelling errors after approval." }
        };
        function openInfoModal(type) {
            document.getElementById('infoTitle').innerText = infoContent[type].title;
            document.getElementById('infoBody').innerText = infoContent[type].body;
            document.getElementById('infoModalOverlay').classList.remove('hidden');
        }
        function closeInfoModal() { document.getElementById('infoModalOverlay').classList.add('hidden'); }
    </script>
</body>
</html>
