<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Join the Elite | 27668grafix</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { 
                extend: { 
                    colors: { "primary": "#ff6a00", "background-dark": "#121212" }, 
                    fontFamily: { "display": ["Inter", "sans-serif"] } 
                } 
            }
        }
    </script>
    <style>
        .glass-effect { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .bg-mesh { 
            background-color: #121212; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 106, 0, 0.15) 0px, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(255, 106, 0, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }
        /* Fix for mobile input zooming */
        input { font-size: 16px !important; }
    </style>
</head>
<body class="font-display bg-background-dark text-slate-100 antialiased bg-mesh min-h-screen">
    
    <!-- Header -->
    <header class="w-full flex items-center justify-between px-4 sm:px-10 lg:px-20 py-4 sm:py-6 fixed top-0 z-50 bg-background-dark/50 backdrop-blur-sm md:bg-transparent">
        <div class="flex items-center gap-2 sm:gap-3">
            <div class="w-7 h-7 sm:w-8 sm:h-8 bg-primary rounded-lg flex items-center justify-center text-white">
                <span class="material-symbols-outlined text-xl sm:text-2xl">grid_view</span>
            </div>
            <h1 class="text-lg sm:text-xl font-bold tracking-tight uppercase">27668grafix</h1>
        </div>
    </header>

    <main class="min-h-screen flex items-center justify-center p-4 sm:p-6 pt-24 pb-12">
        <div class="w-full max-w-[480px] space-y-6 sm:space-y-8">
            <div class="glass-effect p-6 sm:p-8 md:p-10 rounded-2xl shadow-2xl">
                <div class="text-center mb-6 sm:mb-8">
                    <h2 class="text-2xl sm:text-3xl font-bold mb-2 tracking-tight italic">Join the Elite</h2>
                    <p class="text-slate-400 text-xs sm:text-sm">Create an account to start your branding journey.</p>
                </div>

                <!-- Role Switcher -->
                <div class="flex p-1 mb-6 bg-black/40 rounded-xl border border-white/5">
                    <label class="flex-1 cursor-pointer">
                        <input checked class="peer hidden" name="role" type="radio" value="customer" onchange="toggleCorporateField()"/>
                        <div class="py-2.5 text-center text-xs sm:text-sm font-semibold rounded-lg transition-all peer-checked:bg-primary peer-checked:text-white text-slate-400">Customer</div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input class="peer hidden" name="role" type="radio" value="corporate" onchange="toggleCorporateField()"/>
                        <div class="py-2.5 text-center text-sm font-semibold rounded-lg transition-all peer-checked:bg-primary peer-checked:text-white text-slate-400 text-xs sm:text-sm">Partner</div>
                    </label>
                </div>

                <form id="signupForm" class="space-y-4">
                    <div class="space-y-1">
                        <input type="text" id="fullname" placeholder="Full Name" required class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary outline-none transition-all placeholder:text-slate-500">
                    </div>
                    
                    <div id="corporateGroup" class="hidden">
                        <input type="text" id="companyName" placeholder="Company Name" class="w-full bg-white/5 border border-primary/30 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary outline-none transition-all">
                    </div>

                    <div class="space-y-1">
                        <input type="email" id="email" placeholder="Email Address" required class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary outline-none transition-all placeholder:text-slate-500">
                    </div>

                    <div class="space-y-1">
                        <input type="tel" id="phone" placeholder="Phone Number" required class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary outline-none transition-all placeholder:text-slate-500">
                    </div>

                    <div class="space-y-1">
                        <input type="password" id="password" placeholder="Password (Min 6 chars)" required minlength="6" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary outline-none transition-all placeholder:text-slate-500">
                    </div>
                    
                    <button type="submit" id="submitBtn" class="w-full bg-primary hover:bg-orange-600 text-white font-bold py-3.5 sm:py-4 rounded-xl transition-all shadow-lg shadow-primary/20 mt-4 active:scale-95">
                        Create Account
                    </button>
                </form>

                <p class="mt-6 text-center text-slate-500 text-xs sm:text-sm">
                    Already a member? <a href="login.html" class="text-primary font-bold hover:underline">Sign In</a>
                </p>
            </div>
            
            <!-- Footer Links -->
            <div class="flex justify-between items-center px-2 text-[10px] uppercase font-bold text-slate-600 tracking-widest">
                <p>© 2024 27668grafix</p>
                <div class="flex gap-4">
                    <span class="cursor-pointer hover:text-primary transition-colors" onclick="openInfoModal('privacy')">Privacy</span>
                    <span class="cursor-pointer hover:text-primary transition-colors" onclick="openInfoModal('terms')">Terms</span>
                </div>
            </div>
        </div>
    </main>

    <!-- SUCCESS OVERLAY -->
    <div id="successOverlay" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] hidden flex items-center justify-center p-6 text-center">
        <div class="max-w-xs">
            <span class="material-symbols-outlined text-primary text-6xl sm:text-7xl mb-4">check_circle</span>
            <h2 class="text-2xl sm:text-3xl font-black uppercase italic text-white mb-2 tracking-tight">Successful!</h2>
            <p class="text-slate-400 text-sm">Welcome to the elite. Redirecting to login...</p>
        </div>
    </div>

    <!-- MODAL -->
    <div id="infoModalOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div id="infoModalBox" class="glass-effect p-6 sm:p-8 rounded-2xl max-w-sm w-full relative">
            <h3 id="infoTitle" class="text-lg font-bold text-white mb-3 italic text-primary"></h3>
            <div id="infoBody" class="text-slate-400 text-xs sm:text-sm leading-relaxed"></div>
            <button onclick="closeInfoModal()" class="mt-6 w-full py-2.5 bg-primary/10 border border-primary/20 text-primary font-bold rounded-lg hover:bg-primary hover:text-white transition-all text-xs uppercase tracking-widest">Close</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bmyimmssovqcznwixceu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJteWltbXNzb3ZxY3pud2l4Y2V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MDY4MjcsImV4cCI6MjA4NzQ4MjgyN30.e5ywzLSv5v4TzeHrOZrc3uFe4UDV-l845RAMUS3PEe4';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleCorporateField() {
            const role = document.querySelector('input[name="role"]:checked').value;
            const field = document.getElementById('corporateGroup');
            if(role === 'corporate') {
                field.classList.remove('hidden');
            } else {
                field.classList.add('hidden');
            }
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            btn.innerText = "Processing...";
            btn.disabled = true;
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;

            const { data, error } = await supabaseClient.auth.signUp({
                email: email, 
                password: password,
                options: { 
                    data: { 
                        full_name: document.getElementById('fullname').value, 
                        phone: document.getElementById('phone').value,
                        user_role: role,
                        company: document.getElementById('companyName').value || "None"
                    } 
                }
            });

            if (error) { 
                alert("Error: " + error.message); 
                btn.innerText = originalText;
                btn.disabled = false;
            } else { 
                document.getElementById('successOverlay').classList.remove('hidden');
                setTimeout(() => window.location.href = 'login.html', 2500);
            }
        });

        const infoContent = {
            privacy: { title: "Privacy Policy 🛡️", body: "We protect your design files and personal data strictly for order fulfillment. Your data is encrypted and never sold." },
            terms: { title: "Terms & Conditions 📜", body: "Production begins after design sign-off. Standard production is 3-5 working days. Payments are required before delivery." }
        };

        function openInfoModal(type) {
            document.getElementById('infoTitle').innerText = infoContent[type].title;
            document.getElementById('infoBody').innerText = infoContent[type].body;
            document.getElementById('infoModalOverlay').classList.remove('hidden');
        }
        function closeInfoModal() { document.getElementById('infoModalOverlay').classList.add('hidden'); }
    </script>
</body>
</html>
